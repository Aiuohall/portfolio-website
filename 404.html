<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Abu Aiuohall Md Ratul</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    .nf-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .nf-card { padding: 3.5rem; max-width: 520px; }
    .nf-code {
      font-family: var(--font-display);
      font-size: 6rem;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nf-title {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 700;
      margin: 0.5rem 0 0.8rem;
      color: var(--text);
    }
    .nf-desc { color: var(--text-muted); margin-bottom: 2rem; }
  </style>
</head>
<body>
  <div class="nf-wrap">
    <div class="nf-card glass-panel">
      <div class="nf-code">404</div>
      <h1 class="nf-title">Page Not Found</h1>
      <p class="nf-desc">The page you're looking for doesn't exist or has been moved.</p>
      <a class="social-btn primary" href="/"><i class="ti ti-home"></i> Back to Home</a>
    </div>
  </div>
</body>
</html>
